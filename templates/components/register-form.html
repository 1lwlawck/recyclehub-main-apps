<link
  rel="stylesheet"
  href="{{ url_for('static', filename='dist/css/output.css') }}"
/>
<div class="bg-white flex items-center justify-center min-h-screen">
  <div class="flex bg-white shadow-lg rounded-lg overflow-hidden max-w-4xl">
    <!-- Bagian kiri dengan ilustrasi -->
    <div class="hidden md:flex md:w-1/2 bg-gray-50 items-center justify-center">
      <img
        src="https://flowbite.s3.amazonaws.com/blocks/marketing-ui/authentication/illustration.svg"
        alt="Ilustrasi Registrasi"
        class="w-3/4 h-auto"
      />
    </div>

    <!-- Bagian kanan dengan form -->
    <div class="w-full md:w-1/2 p-8 md:p-10 lg:p-16">
      <div class="flex items-center mb-6">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-8 w-8 text-blue-600 mr-2"
          fill="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            d="M12 2C6.486 2 2 6.486 2 12c0 5.514 4.486 10 10 10s10-4.486 10-10c0-5.514-4.486-10-10-10zm-1 15v-4h2v4h-2zm0-6V7h2v4h-2z"
          />
        </svg>
        <h2 class="text-3xl font-bold text-gray-800">Buat Akun</h2>
      </div>
      <p class="text-gray-600 mb-8">
        Mulai daftar kemitraan Anda segera. Sudah punya akun?
        <a
          href="{{ url_for('auth.login') }}"
          class="text-green-600 hover:underline"
          >Masuk.</a
        >
      </p>

      <form
        action="{{ url_for('auth.register') }}"
        method="POST"
        class="space-y-4"
      >
        {% with messages = get_flashed_messages(with_categories=true) %} {% for
        category, message in messages %}
        <div
          class="p-3 mb-4 rounded-md text-sm text-white bg-{{ 'red-500' if category == 'danger' else 'green-500' }}"
        >
          {{ message }}
        </div>
        {% endfor %} {% endwith %}

        <!-- Nama User -->
        <div>
          <label for="nama_user" class="block text-sm font-medium text-gray-700"
            >Nama Lengkap</label
          >
          <input
            type="text"
            id="nama_user"
            name="nama_user"
            placeholder="Nama Lengkap Anda"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md text-gray-700 focus:outline-none focus:ring-green-500 focus:border-green-500"
          />
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700"
            >Email</label
          >
          <input
            type="email"
            id="email"
            name="email"
            placeholder="banksampah@gmail.com"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md text-gray-700 focus:outline-none focus:ring-green-500 focus:border-green-500"
          />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700"
            >Password</label
          >
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md text-gray-700 focus:outline-none focus:ring-green-500 focus:border-green-500"
          />
        </div>

        <!-- Confirm Password -->
        <div>
          <label
            for="confirm_password"
            class="block text-sm font-medium text-gray-700"
            >Konfirmasi Password</label
          >
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="••••••••"
            required
            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md text-gray-700 focus:outline-none focus:ring-green-500 focus:border-green-500"
          />
        </div>

        <!-- Tombol Register -->
        <button
          type="submit"
          class="w-full py-2 px-4 bg-green-700 hover:bg-green-800 text-white font-medium rounded-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500"
        >
          Buat Akun Anda
        </button>

        <div class="flex items-center justify-center space-x-4 my-4">
          <span class="text-gray-400">Atau</span>
        </div>

        <!-- Tombol Google -->
        <div class="flex items-center justify-center space-x-4">
          {% include 'components/btn-google.html' %}
        </div>
      </form>
    </div>
  </div>
</div>
