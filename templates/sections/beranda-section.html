<section class="bg-white w-full h-full animate__animated animate__pulse">
  <div
    class="mx-auto max-w-screen-2xl px-4 py-16 sm:px-6 sm:py-20 lg:px-8 lg:py-28 font-inconsolata"
  >
    <div class="grid grid-cols-1 gap-10 lg:grid-cols-2 lg:gap-16">
      <!-- Image and decorative elements -->
      <div
        class="relative flex items-center justify-center lg:pr-12 sm:mt-5 lg:mt-10"
        data-aos="fade-up"
        data-aos-duration="1000"
      >
        <!-- Decorative circles -->
        <div
          class="absolute top-1/2 -left-8 sm:left-8 w-32 h-32 sm:w-48 sm:h-48 bg-[#D1E8E4] rounded-full transform -translate-y-1/2 animate__animated animate__fadeInLeft"
        ></div>
        <!-- Main image -->
        <img
          alt="RecycleHub App"
          class="w-3/4 sm:w-full h-auto relative z-10 drop-shadow-2xl mt-6 animate__animated animate__zoomIn"
          src="/static/images/logos.svg"
        />
      </div>

      <!-- Text content with added padding -->
      <div
        class="flex flex-col justify-center lg:pl-12 px-4"
        data-aos="fade-left"
        data-aos-duration="1000"
        data-aos-delay="200"
      >
        <h2
          class="text-3xl sm:text-4xl lg:text-5xl font-bold text-[#004F4F] animate__animated animate__fadeInDown"
        >
          RecycleHub
        </h2>
        <p
          class="mt-4 sm:mt-6 sm:text-lg text-gray-700 animate__animated animate__fadeInUp text-lg"
        >
          <strong class="font-bold">RecycleHub</strong> adalah aplikasi inovatif
          yang membantu masyarakat mendaur ulang sampah botol plastik dengan
          cara yang mudah dan bermanfaat. Setiap kali Anda melakukan daur ulang
          melalui RecycleHub, Anda akan mendapatkan poin yang dapat ditukar
          dengan berbagai hadiah menarik.
        </p>
        <div class="mt-6 sm:mt-8">
          <a
            class="inline-flex items-center px-6 py-3 sm:px-8 sm:py-4 bg-[#004F4F] text-white text-sm sm:text-base font-medium rounded-md shadow-lg hover:bg-[#003838] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#003838] animate__animated animate__heartBeat"
            href="#"
          >
            Download
            <svg
              class="ml-2 sm:ml-3 w-5 h-5 sm:w-6 sm:h-6"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewbox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M9 5l7 7-7 7"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
